<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Supply-Chain Security Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h1 { font-size: 20px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ddd; padding: 8px; }
    th { background: #f5f5f5; text-align: left; }
    .sev-critical { color: #fff; background: #c62828; padding: 2px 6px; border-radius: 4px; }
    .sev-high { color: #fff; background: #ef6c00; padding: 2px 6px; border-radius: 4px; }
    .sev-medium { color: #fff; background: #fbc02d; padding: 2px 6px; border-radius: 4px; }
    .sev-low { color: #333; background: #e0e0e0; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Supply-Chain Security Dashboard</h1>
  <div class="grid">
    <div>
      <h2>Machines</h2>
      <table id="machines"><thead><tr><th>UUID</th><th>Hostname</th><th>OS</th><th>Last Seen</th></tr></thead><tbody></tbody></table>
    </div>
    <div>
      <h2>Recent Alerts</h2>
      <table id="alerts"><thead><tr><th>Machine</th><th>Package</th><th>Severity</th><th>CVE</th><th>Fix</th><th>When</th></tr></thead><tbody></tbody></table>
    </div>
  </div>
  <script src="client.js"></script>
</body>
</html>
